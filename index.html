<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Medvid Scalp Pro</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --accent: #f0b90b; --up: #0ecb81; --down: #f6465d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .header { background: #1e2329; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid #333; height: 45px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: calc(100vh - 45px); gap: 2px; background: #333; }
        .chart-card { background: var(--bg); position: relative; }
        .info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; pointer-events: none; }
        .symbol { font-size: 18px; font-weight: bold; color: var(--accent); }
        /* Кнопка запуску для обходу захисту браузера */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
                    display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="text-align: center;">
        <h1 style="color:var(--accent)">MEDVID SCREENER PRO</h1>
        <p>Натисніть тут для запуску потоку даних ⚡</p>
    </div>
</div>

<div class="header">
    <b style="color:var(--accent)">MEDVID STATION</b>
    <span style="margin-left: 20px; font-size: 12px; color: #848e9c;">MEXC Live • 5m Timeframe</span>
</div>

<div class="grid">
    <div class="chart-card" id="c0"></div>
    <div class="chart-card" id="c1"></div>
    <div class="chart-card" id="c2"></div>
    <div class="chart-card" id="c3"></div>
</div>

<script>
    // Список монет (можеш змінити на будь-які інші)
    const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'PEPEUSDT'];

    document.getElementById('overlay').onclick = function() {
        this.style.display = 'none'; // Ховаємо заставку
        symbols.forEach((s, i) => createChart(s, i));
    };

    function createChart(symbol, index) {
        const container = document.getElementById('c' + index);
        container.innerHTML = `<div class="info"><div class="symbol">${symbol}</div><div id="p-${symbol}">Завантаження...</div></div>`;
        
        // Створення графіку
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#0b0e11' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            timeScale: { visible: false },
            crosshair: { mode: 0 }
        });

        const series = chart.addCandlestickSeries({
            upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false, wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
        });

        // Підключення до WebSocket MEXC (не блокується CORS на Vercel)
        const ws = new WebSocket('wss://wbs.mexc.com/ws');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                "method": "SUBSCRIPTION",
                "params": [`spot@public.kline.v3.api@${symbol}@Min5`]
            }));
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.d && data.d.k) {
                const k = data.d.k;
                series.update({
                    time: k.t / 1000,
                    open: parseFloat(k.o),
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: parseFloat(k.c)
                });
                document.getElementById(`p-${symbol}`).innerText = `$${parseFloat(k.c).toFixed(5)}`;
                document.getElementById(`p-${symbol}`).style.color = parseFloat(k.c) >= parseFloat(k.o) ? '#0ecb81' : '#f6465d';
            }
        };

        // Авто-розмір при зміні вікна
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        });
    }
</script>
</body>
</html>
